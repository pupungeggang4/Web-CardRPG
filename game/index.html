<!DOCTYPE html>
<html>
    <head>
        <title>Card RPG</title>
        <style>
            @font-face {
                font-family: neodgm;
                src: url("asset/font/neodgm.ttf");
            }

            body {
                touch-action: none;
                overscroll-behavior: none;
            }

            #screen {
                border: 2px solid black;
                position: absolute;
                left: 0;
                right: 0;
                top: 0;
                bottom: 0;
                margin: auto;
                max-width: 96%;
                max-height: 96%;
            }
        </style>
    </head>
    <body>
        <canvas id="screen" width="1280" height="720"></canvas>
        <script src="data/card.js"></script>
        <script src="data/crystal.js"></script>
        <script src="data/equipment.js"></script>

        <script src="script/asset.js"></script>
        <script src="script/ui.js"></script>

        <script src="script/primitive.js"></script>

        <script src="script/ui/menuwindowfield.js"></script>
        <script src="script/ui/menuwindowbattle.js"></script>

        <script src="script/field/field.js"></script>
        <script src="script/field/fieldplayer.js"></script>

        <script src="script/entity/entity.js"></script>
        <script src="script/entity/card.js"></script>
        <script src="script/entity/unit.js"></script>

        <script src="script/render.js"></script>
        <script src="script/util.js"></script>
        <script src="script/game.js"></script>

        <script src="script/scenetitle.js"></script>
        <script src="script/scenefield.js"></script>
        <script src="script/scenebattle.js"></script>

        <script src="script/main.js"></script>
    </body>
</html>
